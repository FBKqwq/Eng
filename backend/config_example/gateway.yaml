# ELK / Kafka 网关统一配置（示例）
#
# 用途：后端连接 Kafka、Elasticsearch、Kibana 的统一地址来源。
#       复制本文件到 backend/config/gateway.yaml 并按场景修改 host。
#
# 场景说明：
#   - 本机同时跑 Docker 与后端：host 填 localhost
#   - 局域网其他电脑连宿主机 Docker：host 填宿主机 LAN IP（如 192.168.x.x / 10.x.x.x）
#
#
# 基础设施前提（局域网远程连 Kafka）：
#   docker-compose 中 Kafka EXTERNAL 已 advertise 宿主机 IP 26.167.86.202:9092。
#   修改 compose 后需执行：docker compose up -d kafka
#   Elasticsearch / Kibana 需宿主机防火墙放行 9200 / 5601 端口。

gateway:
  # 基础设施宿主机地址（Docker 宿主机）
  host: "26.167.86.202"

  kafka:
    # 留空则自动拼接为 {host}:9092
    bootstrap_servers: ""
    topic: "app-logs"

  elasticsearch:
    scheme: "http"
    port: 9200
    # 留空则自动拼接为 {scheme}://{host}:{port}
    hosts: ""
    index_pattern: "app-logs-*"
    username: "elastic"
    password: ""

  kibana:
    # 留空则自动拼接为 http://{host}:5601
    base_url: ""
