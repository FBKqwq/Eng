input {
	beats {
		port => 5044
	}

	tcp {
		port => 50000
	}

	kafka {
		bootstrap_servers => "${LS_PIPELINE_KAFKA_BOOTSTRAP_SERVERS}"
		topics => ["${LS_PIPELINE_KAFKA_TOPIC}"]
		group_id => "${LS_PIPELINE_KAFKA_GROUP_ID:logstash-app-logs}"
		client_id => "logstash-kafka-consumer"
		codec => "json"
		consumer_threads => 1
		tags => ["pipeline_kafka_app_logs"]
		auto_offset_reset => "earliest"
		# broker 重启或元数据变更后，缩短 stale metadata 窗口，避免消费端长期不拉新消息
		metadata_max_age_ms => 30000
	}
}

filter {
	if [timestamp] {
		date {
			match => [ "timestamp", "ISO8601" ]
			target => "@timestamp"
		}
	}

	# Kafka 业务日志：为 output 准备索引名片段
	if "pipeline_kafka_app_logs" in [tags] {
		if [log_type] {
			mutate {
				add_field => { "[@metadata][index_segment]" => "%{log_type}" }
			}
		} else {
			mutate {
				add_field => { "[@metadata][index_segment]" => "unknown" }
			}
		}
	}
}

output {
	if "pipeline_kafka_app_logs" in [tags] {
		elasticsearch {
			hosts => "elasticsearch:9200"
			user => "logstash_internal"
			password => "${LOGSTASH_INTERNAL_PASSWORD}"
			index => "app-logs-%{[@metadata][index_segment]}-%{+YYYY.MM.dd}"
		}
	} else {
		elasticsearch {
			hosts => "elasticsearch:9200"
			user => "logstash_internal"
			password => "${LOGSTASH_INTERNAL_PASSWORD}"
		}
	}
}
